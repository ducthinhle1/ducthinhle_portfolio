<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(74,160,80,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(137,180,250,0.1)"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="150" cy="150" r="180" fill="rgba(74,160,80,0.12)" filter="url(#blur)"/>
  <circle cx="650" cy="450" r="160" fill="rgba(137,180,250,0.1)" filter="url(#blur)"/>

  <!-- Card -->
  <rect x="60" y="80" width="680" height="440" rx="20" fill="rgba(22,27,34,0.9)" stroke="rgba(74,160,80,0.25)" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="60" y="80" width="680" height="4" rx="2" fill="rgba(74,160,80,0.6)"/>

  <!-- Logo image embedded -->
  <image href="./GreenHealthySchoolsLogo.png" x="220" y="110" width="360" height="160" preserveAspectRatio="xMidYMid meet"/>

  <!-- Divider -->
  <line x1="120" y1="295" x2="680" y2="295" stroke="rgba(74,160,80,0.2)" stroke-width="1"/>

  <!-- Status badges -->
  <rect x="120" y="315" width="130" height="32" rx="16" fill="rgba(74,160,80,0.12)" stroke="rgba(74,160,80,0.3)" stroke-width="1"/>
  <text x="185" y="335" font-family="monospace" font-size="11" fill="#4caf50" text-anchor="middle" font-weight="600">● New</text>

  <rect x="265" y="315" width="160" height="32" rx="16" fill="rgba(137,180,250,0.1)" stroke="rgba(137,180,250,0.25)" stroke-width="1"/>
  <text x="345" y="335" font-family="monospace" font-size="11" fill="#89b4fa" text-anchor="middle" font-weight="600">◐ In Progress</text>

  <rect x="440" y="315" width="150" height="32" rx="16" fill="rgba(180,190,254,0.08)" stroke="rgba(180,190,254,0.2)" stroke-width="1"/>
  <text x="515" y="335" font-family="monospace" font-size="11" fill="#b4befe" text-anchor="middle" font-weight="600">✓ Completed</text>

  <!-- Save as Draft button -->
  <rect x="120" y="365" width="140" height="34" rx="8" fill="rgba(74,160,80,0.15)" stroke="rgba(74,160,80,0.35)" stroke-width="1"/>
  <text x="190" y="386" font-family="monospace" font-size="11" fill="#4caf50" text-anchor="middle">💾 Save as Draft</text>

  <!-- Description lines -->
  <rect x="120" y="415" width="420" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
  <rect x="120" y="433" width="340" height="10" rx="5" fill="rgba(255,255,255,0.04)"/>
  <rect x="120" y="451" width="380" height="10" rx="5" fill="rgba(255,255,255,0.05)"/>

  <!-- Tech tag -->
  <rect x="560" y="415" width="160" height="48" rx="10" fill="rgba(137,180,250,0.08)" stroke="rgba(137,180,250,0.2)" stroke-width="1"/>
  <text x="640" y="437" font-family="monospace" font-size="10" fill="#89b4fa" text-anchor="middle">Angular</text>
  <text x="640" y="453" font-family="monospace" font-size="10" fill="#89b4fa" text-anchor="middle">Node.js</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f0ebe3"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="450" fill="#e8e2d9"/>
  <text x="24" y="48" font-family="serif" font-size="15" fill="#1a1a1a" font-weight="bold">Price Monitor</text>
  <rect x="12" y="118" width="156" height="36" rx="6" fill="#1a1a1a"/>
  <text x="24" y="141" font-family="sans-serif" font-size="11" fill="#ffffff">Dashboard</text>
  <text x="24" y="182" font-family="sans-serif" font-size="11" fill="#888">Settings</text>
  <text x="24" y="224" font-family="sans-serif" font-size="11" fill="#888">+ Add product</text>
  <text x="24" y="260" font-family="sans-serif" font-size="11" fill="#888">↻  Check now</text>
  <!-- Main -->
  <text x="210" y="48" font-family="serif" font-size="20" fill="#1a1a1a" font-weight="bold">Good morning — </text>
  <text x="430" y="48" font-family="serif" font-size="20" fill="#c8a96e" font-style="italic" font-weight="bold">3 on watch</text>
  <!-- Stat cards -->
  <rect x="210" y="70" width="130" height="80" rx="8" fill="#ffffff" opacity="0.8"/>
  <text x="225" y="96" font-family="sans-serif" font-size="8" fill="#888" letter-spacing="1">TARGET HITS</text>
  <text x="225" y="128" font-family="sans-serif" font-size="26" fill="#e07b4a" font-weight="bold">0</text>

  <rect x="355" y="70" width="130" height="80" rx="8" fill="#ffffff" opacity="0.8"/>
  <text x="370" y="96" font-family="sans-serif" font-size="8" fill="#888" letter-spacing="1">PRICE DROPS</text>
  <text x="370" y="128" font-family="sans-serif" font-size="26" fill="#5a8a5a" font-weight="bold">0</text>

  <rect x="500" y="70" width="130" height="80" rx="8" fill="#ffffff" opacity="0.8"/>
  <text x="515" y="96" font-family="sans-serif" font-size="8" fill="#888" letter-spacing="1">TRACKING</text>
  <text x="515" y="128" font-family="sans-serif" font-size="26" fill="#1a1a1a" font-weight="bold">3</text>

  <!-- Product cards -->
  <rect x="210" y="170" width="175" height="110" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="224" y="184" width="40" height="40" rx="6" fill="#f0ebe3"/>
  <rect x="272" y="188" width="90" height="8" rx="3" fill="#1a1a1a" opacity="0.7"/>
  <rect x="272" y="202" width="50" height="6" rx="3" fill="#5a7fc8" opacity="0.5"/>
  <text x="224" y="252" font-family="sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">$55</text>
  <text x="260" y="248" font-family="sans-serif" font-size="11" fill="#888">.00</text>

  <rect x="400" y="170" width="175" height="110" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="414" y="184" width="40" height="40" rx="6" fill="#f0ebe3"/>
  <rect x="462" y="188" width="90" height="8" rx="3" fill="#1a1a1a" opacity="0.7"/>
  <rect x="462" y="202" width="50" height="6" rx="3" fill="#e05a5a" opacity="0.5"/>
  <text x="414" y="252" font-family="sans-serif" font-size="11" fill="#aaa">Not checked yet</text>

  <rect x="210" y="295" width="175" height="110" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="224" y="309" width="40" height="40" rx="6" fill="#f0ebe3"/>
  <rect x="272" y="313" width="90" height="8" rx="3" fill="#1a1a1a" opacity="0.7"/>
  <rect x="272" y="327" width="60" height="6" rx="3" fill="#5a7fc8" opacity="0.5"/>
  <text x="224" y="377" font-family="sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">$49</text>
  <text x="260" y="373" font-family="sans-serif" font-size="11" fill="#888">.99</text>
</svg>

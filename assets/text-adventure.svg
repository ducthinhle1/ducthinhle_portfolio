<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Terminal window frame -->
  <rect x="60" y="60" width="680" height="480" rx="12" fill="#0d1117" stroke="rgba(137,180,250,0.15)" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="60" y="60" width="680" height="40" rx="12" fill="#161b22"/>
  <rect x="60" y="80" width="680" height="20" fill="#161b22"/>

  <!-- Window dots -->
  <circle cx="96" cy="80" r="7" fill="#ff5f57"/>
  <circle cx="120" cy="80" r="7" fill="#febc2e"/>
  <circle cx="144" cy="80" r="7" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="400" y="85" font-family="monospace" font-size="13" fill="#484f58" text-anchor="middle">diary — adventure.jar</text>

  <!-- Terminal content -->
  <text x="100" y="135" font-family="monospace" font-size="13" fill="#4caf50">$</text>
  <text x="116" y="135" font-family="monospace" font-size="13" fill="#e6edf3"> java -jar adventure.jar</text>

  <text x="100" y="168" font-family="monospace" font-size="13" fill="#89b4fa">══════════════════════════════════════</text>
  <text x="100" y="192" font-family="monospace" font-size="14" font-weight="bold" fill="#e6edf3">  THE DIARY — Text Adventure</text>
  <text x="100" y="212" font-family="monospace" font-size="13" fill="#89b4fa">══════════════════════════════════════</text>

  <text x="100" y="244" font-family="monospace" font-size="13" fill="#8b949e">  You wake up in a dimly lit room.</text>
  <text x="100" y="264" font-family="monospace" font-size="13" fill="#8b949e">  A dusty diary lies on the table.</text>
  <text x="100" y="284" font-family="monospace" font-size="13" fill="#8b949e">  The door to the north is closed.</text>

  <text x="100" y="316" font-family="monospace" font-size="13" fill="#b4befe">  Exits: NORTH  EAST</text>
  <text x="100" y="336" font-family="monospace" font-size="13" fill="#b4befe">  Items: DIARY  CANDLE</text>

  <text x="100" y="368" font-family="monospace" font-size="13" fill="#484f58">──────────────────────────────────────</text>

  <text x="100" y="396" font-family="monospace" font-size="13" fill="#8b949e">  What do you do?</text>
  <text x="100" y="420" font-family="monospace" font-size="13" fill="#4caf50">&gt;</text>
  <text x="116" y="420" font-family="monospace" font-size="13" fill="#e6edf3"> pick up diary</text>

  <text x="100" y="452" font-family="monospace" font-size="13" fill="#8b949e">  You picked up the diary. It feels heavy.</text>

  <!-- Blinking cursor line -->
  <text x="100" y="484" font-family="monospace" font-size="13" fill="#4caf50">&gt;</text>
  <rect x="116" y="470" width="9" height="16" fill="#4caf50" opacity="0.8"/>
</svg>
